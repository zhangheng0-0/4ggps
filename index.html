        :root {

            --card:    #111820;

            --text2:   #7a90a8;

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);

<script>
// ══════════════════════════════════════════════════
//  工具函数
// ══════════════════════════════════════════════════

// CRC16 Modbus
function crc16(buf) {
    let crc = 0xFFFF;
    for (let i = 0; i < buf.length; i++) {
        crc ^= buf[i];
        for (let j = 0; j < 8; j++) {
            crc = (crc & 1) ? (crc >>> 1) ^ 0xA001 : crc >>> 1;
        }
    }
    return crc;
}

// 字节数组 → "XX XX" 格式字符串
function toHexStr(arr) {
    return arr.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
}

// 构建 03H 读帧
function buildRead03(slaveAddr, startReg, count) {
    const buf = [
        slaveAddr, 0x03,
        (startReg >> 8) & 0xFF, startReg & 0xFF,
        (count >> 8) & 0xFF,    count & 0xFF
    ];
    const crc = crc16(buf);
    buf.push(crc & 0xFF, (crc >> 8) & 0xFF);
    return toHexStr(buf);
}

// 构建 10H 写多寄存器帧，regs 为 16bit 无符号值数组
function buildWrite10(slaveAddr, startReg, regs) {
    const count = regs.length;
    const buf = [
        slaveAddr, 0x10,
        (startReg >> 8) & 0xFF, startReg & 0xFF,
        (count >> 8) & 0xFF,    count & 0xFF,
        count * 2
    ];
    for (const v of regs) { buf.push((v >> 8) & 0xFF, v & 0xFF); }
    const crc = crc16(buf);
    buf.push(crc & 0xFF, (crc >> 8) & 0xFF);
    return toHexStr(buf);
}

// hex字符串（有无空格皆可）→ 字节数组
function hexToBytes(hex) {
    const s = hex.replace(/\s+/g, '');
    const out = [];
    for (let i = 0; i < s.length; i += 2) out.push(parseInt(s.substr(i, 2), 16));
    return out;
}

// 校验响应帧 CRC
function verifyCRC(bytes) {
    if (bytes.length < 4) return false;
    const crc = crc16(bytes.slice(0, -2));
    return bytes[bytes.length - 2] === (crc & 0xFF) &&
           bytes[bytes.length - 1] === ((crc >> 8) & 0xFF);
}

// 从 03H 响应帧解析寄存器数组（无符号 16bit）
function parseRegisters(bytes) {
    const byteCount = bytes[2];
    const regs = [];
    for (let i = 0; i < byteCount; i += 2) {
        regs.push(((bytes[3 + i] & 0xFF) << 8) | (bytes[4 + i] & 0xFF));
    }
    return regs;
}

// 有符号 16bit
function int16(v) { return v >= 0x8000 ? v - 0x10000 : v; }

// 无符号 32bit（两个连续寄存器，高16在前）
function uint32(hi, lo) { return ((hi & 0xFFFF) * 65536) + (lo & 0xFFFF); }

// 有符号 32bit
function int32(hi, lo) {
    const v = uint32(hi, lo);
    return v >= 0x80000000 ? v - 0x100000000 : v;
}

// 当前时间字符串
function nowStr() {
    const d = new Date();
    return [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
}

// ══════════════════════════════════════════════════
//  MQTT 连接
// ══════════════════════════════════════════════════
const MQTT_URL  = 'wss://i0139f01.ala.cn-hangzhou.emqxsl.cn:8084/mqtt';
const MQTT_OPTS = {
    clientId: 'web_monitor_' + Math.random().toString(16).slice(2, 10),
    username: 'zxc', password: '123456', clean: true
};

const client = mqtt.connect(MQTT_URL, MQTT_OPTS);

// 等待响应队列（同一时刻只发一帧）
let _pendingResolve = null;
let _pendingReject  = null;
let _pendingTimer   = null;

function sendModbus(hexStr) {
    return new Promise((resolve, reject) => {
        if (!client.connected) { reject(new Error('未连接到云端')); return; }
        if (_pendingTimer) { clearTimeout(_pendingTimer); }
        _pendingResolve = resolve;
        _pendingReject  = reject;
        _pendingTimer = setTimeout(() => {
            _pendingResolve = null; _pendingReject = null;
            reject(new Error('响应超时(5s)'));
        }, 5000);
        client.publish('R', JSON.stringify({ cmd: 'uart_send', data: hexStr }));
    });
}

client.on('connect', () => {
    document.getElementById('conn-status').innerText  = '已连接';
    document.getElementById('conn-status').className = 'status-on';
    client.subscribe('T');
});
client.on('offline', () => {
    document.getElementById('conn-status').innerText  = '已断开';
    document.getElementById('conn-status').className = 'status-off';
});

client.on('message', (topic, message) => {
    try {
        const data = JSON.parse(message.toString());

        // ── BMS 串口透传回复 ──
        if (data.cmd === 'uart_recv' && data.data) {
            if (_pendingResolve) {
                clearTimeout(_pendingTimer);
                const cb = _pendingResolve;
                _pendingResolve = null; _pendingReject = null;
                cb(hexToBytes(data.data));
            }
            return;
        }

        // ── 原 GPS 相关回复（原始代码完整保留） ──
        const log = document.getElementById('log-area');
        if (data.cmd === 'get_gps_status_bck') {
            let p = data.param, usedCount = 0;
            if (typeof p.used === 'object') usedCount = p.used.total_sats || 0;
            else usedCount = p.used || 0;
            let viewedCount = p.viewed || usedCount;
            document.getElementById('sat-val').innerText =
                `可见:${viewedCount} 参与定位:${usedCount} 精度:${p.hdop || '--'}`;
        } else if (data.cmd === 'get_csq_bck') {
            document.getElementById('csq-val').innerText =
                `${data.param.csq} (RSSI:${data.param.rssi})`;
            log.innerText = '信号强度查询成功';
        } else if (data.cmd === 'set_gps_interval_bck') {
            log.innerText = '上报间隔修改成功: ' + data.msg;
        } else if (data.cmd === 'get_imei_bck') {
            alert('设备IMEI: ' + data.param.imei);
        } else if (data.lat || (data.param && data.param.lat)) {
            const gps = data.param ? data.param : data;
            updateMap(parseFloat(gps.lng), parseFloat(gps.lat),
                      parseFloat(gps.spd), parseFloat(gps.alt));
        }
    } catch(e) { console.error('解析错误', e); }
});

// 原始 GPS 指令发送（保留）
function sendCommand(cmdName, val) {
    if (!client.connected) return alert('未连接到云端');
    const payload = { cmd: cmdName };
    if (val) payload.data = val;
    client.publish('R', JSON.stringify(payload));
    document.getElementById('log-area').innerText = '已发送: ' + cmdName;
}

// ══════════════════════════════════════════════════
//  BMS 区域1：状态数据
//  读 0x1244 起，共 81 个寄存器（0x51），至 0x12E6
// ══════════════════════════════════════════════════
// 寄存器偏移（相对于起始 0x1244，单位：寄存器=2字节）
// 0x1244 off=0   CellVolAve     UINT16
// 0x1246 off=1   CellVdifMax    UINT16
// 0x1248 off=2   MaxCell(高8) MinCell(低8)
// 0x128A off=35  TempMos        INT16  (0x128A-0x1244=0x46=70字节→35寄存器)
// 0x1290 off=38  BatVol H       UINT32 (0x4C/2=38)
// 0x1292 off=39  BatVol L
// 0x1294 off=40  BatWatt H      UINT32
// 0x1296 off=41  BatWatt L
// 0x1298 off=42  BatCurrent H   INT32
// 0x129A off=43  BatCurrent L
// 0x129C off=44  TempBat1       INT16
// 0x129E off=45  TempBat2       INT16
// 0x12A0 off=46  Alarm H (BIT16-31) UINT32
// 0x12A2 off=47  Alarm L (BIT0-15)
// 0x12A4 off=50  BalanCurrent   INT16  (0x12A4-0x1244=0x60/2=48... 重算)
// 实际偏移用 (绝对地址 - 0x1244) / 2 精确计算：
// 0x12A4: (0x12A4-0x1244)/2 = 0x60/2 = 48  → off=48
// 0x12A6: off=49  BalanSta(高8) SOC%(低8)
// 0x12A8: off=50  SOCCapRemain H   INT32
// 0x12AA: off=51  SOCCapRemain L
// 0x12AC: off=52  SOCFullChargeCap H  UINT32
// 0x12AE: off=53  SOCFullChargeCap L
// 0x12B0: off=54  SOCCycleCount H  UINT32
// 0x12B2: off=55  SOCCycleCount L
// 0x12B4: off=56  SOCCycleCap H  UINT32
// 0x12B6: off=57  SOCCycleCap L
// 0x12C0: off=(0x12C0-0x1244)/2=0x7C/2=62  Charge(高8) DisCharge(低8)
// 0x12E4: off=(0x12E4-0x1244)/2=0xA0/2=80  BatVol 0.01V  UINT16

const ALARM_DEFS = [
    '均衡线电阻过大',  // BIT0
    'MOS过温保护',
    '单体数量不符',
    '电流传感器异常',
    '单体过压保护',
    '电池过压保护',
    '充电过流保护',
    '充电短路保护',
    '充电过温保护',
    '充电低温保护',
    '内部通信异常',
    '单体欠压保护',
    '电池欠压保护',
    '放电过流保护',
    '放电短路保护',
    '放电过温保护',  // BIT15
    '充电管异常',    // BIT16
    '放电管异常',
    'GPS断开连接',
    '请修改授权密码',
    '放电开启失败',
    '电池超温报警',  // BIT21
];

async function readStatus(btn) {
    btn.disabled = true; btn.innerText = '读取中…';
    document.getElementById('status-body').innerHTML =
        '<div class="panel-empty"><span class="spin">⟳</span> 正在读取...</div>';
    try {
        const hex   = buildRead03(0x01, 0x1244, 0x0051);
        const bytes = await sendModbus(hex);
        if (!verifyCRC(bytes))  throw new Error('CRC校验失败');
        if (bytes[1] & 0x80)    throw new Error('设备异常 0x' + bytes[2].toString(16).toUpperCase());
        const r = parseRegisters(bytes);

        const cellVolAve   = r[0];
        const cellVdifMax  = r[1];
        const maxCellNbr   = (r[2] >> 8) & 0xFF;
        const minCellNbr   = r[2] & 0xFF;
        const tempMos      = int16(r[35]) * 0.1;
        const batVol       = uint32(r[38], r[39]);          // mV
        const batWatt      = uint32(r[40], r[41]);          // mW
        const batCurrent   = int32(r[42], r[43]);           // mA
        const tempBat1     = int16(r[44]) * 0.1;
        const tempBat2     = int16(r[45]) * 0.1;
        const alarm32      = uint32(r[46], r[47]);
        const balanCurrent = int16(r[48]);                  // mA
        const balanSta     = (r[49] >> 8) & 0xFF;
        const soc          = r[49] & 0xFF;                  // %
        const capRemain    = int32(r[50], r[51]);           // mAH
        const capFull      = uint32(r[52], r[53]);          // mAH
        const cycleCount   = uint32(r[54], r[55]);
        const cycleCap     = uint32(r[56], r[57]);          // mAH
        const chargeState  = (r[62] >> 8) & 0xFF;
        const discharState = r[62] & 0xFF;
        const batVol2      = r[80] * 0.01;                  // V

        const balanStaStr  = ['关闭','充电均衡','放电均衡'][balanSta] || '--';
        const curSign      = batCurrent >= 0 ? '+' : '';
        const socCls       = soc > 50 ? 'good' : soc > 20 ? 'warn' : 'bad';

        let html = '';

        // 电气参数
        html += `<div class="group-title">电气参数</div>
        <div class="panel-body">
        <div class="data-row"><span class="data-label">电池总电压</span><span class="data-value">${(batVol/1000).toFixed(3)} V</span></div>
        <div class="data-row"><span class="data-label">电池电流</span><span class="data-value">${curSign}${(batCurrent/1000).toFixed(3)} A</span></div>
        <div class="data-row"><span class="data-label">电池功率</span><span class="data-value">${(batWatt/1000).toFixed(2)} W</span></div>
        <div class="data-row"><span class="data-label">电池电压(粗)</span><span class="data-value">${batVol2.toFixed(2)} V</span></div>
        </div>`;

        // 容量 & SOC
        html += `<div class="group-title">容量 / SOC</div>
        <div class="panel-body">
        <div class="data-row"><span class="data-label">剩余电量 SOC</span><span class="data-value ${socCls}">${soc} %</span></div>
        <div class="data-row"><span class="data-label">剩余容量</span><span class="data-value">${(capRemain/1000).toFixed(2)} Ah</span></div>
        <div class="data-row"><span class="data-label">满充容量</span><span class="data-value">${(capFull/1000).toFixed(2)} Ah</span></div>
        <div class="data-row"><span class="data-label">循环次数</span><span class="data-value">${cycleCount} 次</span></div>
        <div class="data-row"><span class="data-label">累计循环容量</span><span class="data-value">${(cycleCap/1000).toFixed(2)} Ah</span></div>
        </div>`;

        // 温度
        html += `<div class="group-title">温度</div>
        <div class="panel-body">
        <div class="data-row"><span class="data-label">功率板温度</span><span class="data-value">${tempMos.toFixed(1)} ℃</span></div>
        <div class="data-row"><span class="data-label">电池温度 1</span><span class="data-value">${tempBat1.toFixed(1)} ℃</span></div>
        <div class="data-row"><span class="data-label">电池温度 2</span><span class="data-value">${tempBat2.toFixed(1)} ℃</span></div>
        </div>`;

        // 单体摘要
        html += `<div class="group-title">单体摘要</div>
        <div class="panel-body">
        <div class="data-row"><span class="data-label">平均电压</span><span class="data-value">${cellVolAve} mV</span></div>
        <div class="data-row"><span class="data-label">最大压差</span><span class="data-value ${cellVdifMax>50?'warn':''}">${cellVdifMax} mV</span></div>
        <div class="data-row"><span class="data-label">最高压单体</span><span class="data-value">C${maxCellNbr}</span></div>
        <div class="data-row"><span class="data-label">最低压单体</span><span class="data-value">C${minCellNbr}</span></div>
        </div>`;

        // 均衡
        html += `<div class="group-title">均衡</div>
        <div class="panel-body">
        <div class="data-row"><span class="data-label">均衡状态</span><span class="data-value">${balanStaStr}</span></div>
        <div class="data-row"><span class="data-label">均衡电流</span><span class="data-value">${balanCurrent} mA</span></div>
        </div>`;

        // 充放电状态
        html += `<div class="group-title">充放电</div>
        <div class="panel-body">
        <div class="data-row"><span class="data-label">充电状态</span><span class="data-value ${chargeState?'good':'bad'}">${chargeState?'开启':'关闭'}</span></div>
        <div class="data-row"><span class="data-label">放电状态</span><span class="data-value ${discharState?'good':'bad'}">${discharState?'开启':'关闭'}</span></div>
        </div>`;

        // 报警位
        const hasAlarm = alarm32 !== 0;
        const alarmTag = hasAlarm
            ? '<span style="color:var(--warn);font-size:11px;">⚠ 有故障</span>'
            : '<span style="color:var(--green);font-size:11px;">✓ 正常</span>';
        html += `<div class="group-title">报警状态 ${alarmTag}</div>
        <div class="alarm-grid">`;
        for (let i = 0; i < ALARM_DEFS.length; i++) {
            const fault = (alarm32 >>> i) & 1;
            html += `<div class="alarm-item ${fault?'fault':''}">
                <div class="alarm-dot"></div>
                <span>${ALARM_DEFS[i]}</span>
            </div>`;
        }
        html += '</div>';

        document.getElementById('status-body').innerHTML = html;
        document.getElementById('status-time').innerText = nowStr();
    } catch(e) {
        document.getElementById('status-body').innerHTML =
            `<div class="panel-empty" style="color:var(--warn);">⚠ ${e.message || e}</div>`;
    }
    btn.disabled = false; btn.innerText = '刷新';
}

// ══════════════════════════════════════════════════
//  BMS 区域2：开关控制
//  读 0x1070 起 5 个寄存器
//  0x1070 = r[0] → BatChargeEN
//  0x1072 = r[1] （保留）
//  0x1074 = r[2] → BatDisChargeEN
//  0x1076 = r[3] （保留）
//  0x1078 = r[4] → BalanEN
// ══════════════════════════════════════════════════
const SWITCH_DEFS = [
    { label: '充电开关', name: 'BatChargeEN',    reg: 0x1070, rIdx: 0 },
    { label: '放电开关', name: 'BatDisChargeEN', reg: 0x1074, rIdx: 2 },
    { label: '均衡开关', name: 'BalanEN',        reg: 0x1078, rIdx: 4 },
];

async function readControl(btn) {
    btn.disabled = true; btn.innerText = '读取中…';
    document.getElementById('ctrl-body').innerHTML =
        '<div class="panel-empty"><span class="spin">⟳</span> 正在读取...</div>';
    try {
        const hex   = buildRead03(0x01, 0x1070, 0x0005);
        const bytes = await sendModbus(hex);
        if (!verifyCRC(bytes)) throw new Error('CRC校验失败');
        if (bytes[1] & 0x80)   throw new Error('设备异常 0x' + bytes[2].toString(16).toUpperCase());
        const r = parseRegisters(bytes);
        renderControl(r);
        document.getElementById('ctrl-time').innerText = nowStr();
    } catch(e) {
        document.getElementById('ctrl-body').innerHTML =
            `<div class="panel-empty" style="color:var(--warn);">⚠ ${e.message || e}</div>`;
    }
    btn.disabled = false; btn.innerText = '刷新';
}

function renderControl(r) {
    let html = '<div class="panel-body">';
    for (const sw of SWITCH_DEFS) {
        const isOn = (r[sw.rIdx] & 0x0001) === 1;
        html += `<div class="switch-row">
            <span class="switch-label">${sw.label}</span>
            <div class="switch-right">
                <span class="sw-state ${isOn?'on':'off'}">${isOn?'开':'关'}</span>
                <button class="sw-btn-on"  onclick="writeSwitch(0x${sw.reg.toString(16)}, 1)">开</button>
                <button class="sw-btn-off" onclick="writeSwitch(0x${sw.reg.toString(16)}, 0)">关</button>
            </div>
        </div>`;
    }
    html += '</div>';
    document.getElementById('ctrl-body').innerHTML = html;
}

async function writeSwitch(reg, val) {
    if (!client.connected) { alert('未连接'); return; }
    const swDef = SWITCH_DEFS.find(s => s.reg === reg);
    const label = swDef ? swDef.label : '0x' + reg.toString(16).toUpperCase();
    if (!confirm(`确认${val ? '开启' : '关闭'} ${label}？`)) return;
    try {
        const hex   = buildWrite10(0x01, reg, [val]);
        const bytes = await sendModbus(hex);
        if (!verifyCRC(bytes)) throw new Error('CRC校验失败');
        if (bytes[1] & 0x80)   throw new Error('写入失败 0x' + bytes[2].toString(16).toUpperCase());
        // 写入成功后静默刷新
        setTimeout(refreshControlSilent, 200);
    } catch(e) {
        alert('写入失败: ' + (e.message || e));
    }
}

async function refreshControlSilent() {
    try {
        const hex   = buildRead03(0x01, 0x1070, 0x0005);
        const bytes = await sendModbus(hex);
        if (!verifyCRC(bytes) || (bytes[1] & 0x80)) return;
        renderControl(parseRegisters(bytes));
        document.getElementById('ctrl-time').innerText = nowStr();
    } catch(e) {}
}

// ══════════════════════════════════════════════════
//  BMS 区域3：单体电压
//  读 0x1200 起 16 个寄存器
// ══════════════════════════════════════════════════
async function readCells(btn) {
    btn.disabled = true; btn.innerText = '读取中…';
    document.getElementById('cells-body').innerHTML =
        '<div class="panel-empty"><span class="spin">⟳</span> 正在读取...</div>';
    try {
        const hex   = buildRead03(0x01, 0x1200, 0x0010);
        const bytes = await sendModbus(hex);
        if (!verifyCRC(bytes)) throw new Error('CRC校验失败');
        if (bytes[1] & 0x80)   throw new Error('设备异常 0x' + bytes[2].toString(16).toUpperCase());
        const r    = parseRegisters(bytes);           // r[0..15] mV
        const maxV = Math.max(...r);
        const minV = Math.min(...r);

        let html = '<div class="cell-grid">';
        for (let i = 0; i < 16; i++) {
            const v   = r[i];
            const cls = v === maxV ? 'cell-high' : v === minV ? 'cell-low' : 'cell-ok';
            html += `<div class="cell-item ${cls}">
                <div class="cell-num">C${String(i+1).padStart(2,'0')}</div>
                <div class="cell-val">${v}</div>
            </div>`;
        }
        html += '</div>';

        // 摘要
        const avgV = Math.round(r.reduce((a,b)=>a+b,0) / r.length);
        html += `<div class="panel-body" style="padding-top:0;">
            <div class="data-row"><span class="data-label">最高单体</span>
                <span class="data-value bad">${maxV} mV &nbsp;(C${r.indexOf(maxV)+1})</span></div>
            <div class="data-row"><span class="data-label">最低单体</span>
                <span class="data-value warn">${minV} mV &nbsp;(C${r.indexOf(minV)+1})</span></div>
            <div class="data-row"><span class="data-label">平均电压</span>
                <span class="data-value">${avgV} mV</span></div>
            <div class="data-row"><span class="data-label">最大压差</span>
                <span class="data-value ${(maxV-minV)>50?'warn':''}">${maxV - minV} mV</span></div>
        </div>`;

        document.getElementById('cells-body').innerHTML = html;
        document.getElementById('cells-time').innerText = nowStr();
    } catch(e) {
        document.getElementById('cells-body').innerHTML =
            `<div class="panel-empty" style="color:var(--warn);">⚠ ${e.message || e}</div>`;
    }
    btn.disabled = false; btn.innerText = '刷新';
}

function switchTab(name, el) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('page-' + name).classList.add('active');
}

// ══════════════════════════════════════════════════
//  高德地图（原始代码完整保留）
// ══════════════════════════════════════════════════
const map = new AMap.Map('container', { zoom: 16, center: [113.222351, 33.774272] });
const marker = new AMap.Marker({
    map: map,
    icon: 'https://a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-default.png'
});

// ====== GPS 轨迹绘制（速度显示 + 连线 + 每隔若干点标注速度）======
let pathData = [];
let polylines = [];
let textMarkers = [];

// 根据速度返回颜色（与原版轨迹页面保持一致）
function getColorBySpeed(speed) {
    if (speed < 15) return '#00FF00';
    if (speed < 30) return '#FFD700';
    if (speed < 45) return '#FF6600';
    return '#FF0000';
}

// 增量绘制新线段 + 速度文字标注
function drawNewSegment(newPoint, index) {
    if (index > 0) {
        const prevPoint = pathData[index - 1];
        const avgSpeed = (prevPoint.speed + newPoint.speed) / 2;

        const polyline = new AMap.Polyline({
            map: map,
            path: [prevPoint.lnglat, newPoint.lnglat],
            strokeColor: getColorBySpeed(avgSpeed),
            strokeOpacity: 0.8,
            strokeWeight: 6,
            strokeStyle: "solid",
        });
        polylines.push(polyline);
    }

    // 每隔若干点展示速度数字
    const displayInterval = 5;
    if (index % displayInterval === 0 || index === pathData.length - 1) {
        const text = new AMap.Text({
            text: newPoint.speed.toFixed(0),
            position: newPoint.lnglat,
            offset: new AMap.Pixel(0, -10),
            style: {
                'background-color': getColorBySpeed(newPoint.speed),
                'border': '1px solid #fff',
                'border-radius': '4px',
                // 文字颜色设为黑色，保证与背景色可区分
                'color': 'rgb(0, 0, 0);',
                'font-size': '16px',
                'font-weight': 'bold',
                'padding': '1px 1px',
                'box-shadow': '0 1px 1px rgba(0,0,0,0.3)'
            }
        });
        text.setMap(map);
        textMarkers.push(text);
    }
}

function updateMap(lng, lat, spd, alt) {
    if (!lng || !lat) return;
    AMap.convertFrom([lng, lat], 'gps', function(status, result) {
        if (result.info === 'ok') {
            const pos = result.locations[0];
            marker.setPosition(pos);
            map.setCenter(pos);

            const speed = (spd || 0);

            // 更新 UI 显示
            document.getElementById('lng').innerText   = lng.toFixed(5);
            document.getElementById('lat').innerText   = lat.toFixed(5);
            const speedEl = document.getElementById('speed');
            speedEl.innerText = speed.toFixed(1) + ' km/h';
            // 速度颜色按档位变化（只影响速度显示，不影响其它区域）
            speedEl.style.color = getColorBySpeed(speed);

            // 添加轨迹点并增量绘制
            pathData.push({ lnglat: pos, speed: speed });
            drawNewSegment({ lnglat: pos, speed: speed }, pathData.length - 1);
        }
    });
}
